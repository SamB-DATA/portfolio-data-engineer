services:

  rag-api:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: rag_events_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    restart: unless-stopped

    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge