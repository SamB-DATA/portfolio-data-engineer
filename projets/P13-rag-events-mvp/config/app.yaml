application:
  name: "RAG Events MVP"
  version: "1.0.0"
  environment: "development"

api:
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "mistral"
  model: "mistral-small-latest"

embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"

vector_store:
  type: "faiss"
  path: "vector_store/faiss_index"

monitoring:
  enabled: true
  log_level: "INFO"

aws:
  region: "eu-west-3"

features:
  memory_enabled: true
  geolocation_enabled: true
  web_search_enabled: true