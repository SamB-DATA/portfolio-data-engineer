version: 1

disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO

  file:
    class: logging.FileHandler
    formatter: standard
    level: INFO
    filename: logs/app.log
    encoding: utf-8

root:
  handlers:
    - console
    - file
  level: INFO